<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毕业模拟器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #0a0e14; color: #c9d1d9;
  min-height: 100vh; display: flex; justify-content: center; align-items: center;
}
#app { width: 100%; max-width: 880px; min-height: 100vh; padding: 20px; }
.screen { display: none; }
.screen.active { display: block; }

#title-screen { text-align: center; padding-top: 60px; }
#title-screen h1 { font-size: 2.6em; background: linear-gradient(135deg, #58a6ff, #3fb950, #d2a8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
#title-screen .sub { font-size: 1em; color: #8b949e; margin: 30px 0; }
#title-screen .warn { font-size: 0.8em; color: #484f58; margin-bottom: 30px; font-style: italic; }

.btn { display: inline-block; padding: 11px 28px; font-size: 0.92em; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-family: inherit; color: #fff; }
.btn:hover { transform: translateY(-2px); }
.bp { background: linear-gradient(135deg, #238636, #2ea043); box-shadow: 0 4px 14px rgba(35,134,54,0.4); }
.bs { background: linear-gradient(135deg, #30363d, #484f58); }
.bw { background: linear-gradient(135deg, #9a6700, #d29922); }
.bd { background: linear-gradient(135deg, #da3633, #f85149); }
.bsm { padding: 6px 14px; font-size: 0.8em; }

#game-screen.active { display: block; }
.gh { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; margin-bottom: 14px; }
.gday { font-size: 1.1em; font-weight: bold; color: #58a6ff; }
.gwk { color: #8b949e; font-size: 0.78em; }
.gtag { font-size: 0.78em; color: #d2a8ff; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }

.panel { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 14px; }
.panel h3 { color: #58a6ff; margin-bottom: 8px; font-size: 0.9em; border-bottom: 1px solid #21262d; padding-bottom: 6px; }
.srow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.slabel { color: #8b949e; font-size: 0.8em; }
.sbar { flex: 1; height: 7px; background: #21262d; border-radius: 3px; margin: 0 8px; overflow: hidden; }
.sfill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
.sr { background: linear-gradient(90deg, #58a6ff, #79c0ff); }
.sp { background: linear-gradient(90deg, #d2a8ff, #e2c8ff); }
.se { background: linear-gradient(90deg, #3fb950, #56d364); }
.sm { background: linear-gradient(90deg, #f0883e, #f0a060); }
.sb { background: linear-gradient(90deg, #f85149, #ff6b6b); }
.sv { color: #c9d1d9; font-size: 0.75em; width: 24px; text-align: right; }

#elog { grid-column: 1 / -1; background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 14px; max-height: 400px; overflow-y: auto; }
#elog h3 { color: #58a6ff; margin-bottom: 8px; font-size: 0.9em; border-bottom: 1px solid #21262d; padding-bottom: 6px; }
.ee { padding: 6px 10px; margin-bottom: 4px; border-radius: 5px; font-size: 0.82em; line-height: 1.55; animation: si 0.3s ease; border-left: 3px solid #30363d; }
@keyframes si { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
.et { border-left-color: #58a6ff; background: #0d1117; color: #58a6ff; font-weight: bold; }
.en { border-left-color: #30363d; }
.ed { border-left-color: #d29922; background: #1a1410; }
.eg { border-left-color: #3fb950; background: #101a14; }
.eb { border-left-color: #f85149; background: #1a1014; }
.es { border-left-color: #58a6ff; background: #0d1520; }
.eo { border-left-color: #8b5e3c; background: #1a1210; color: #c9a050; }
.ec { border-left-color: #d2a8ff; background: #14101a; }
#carea { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

#ending-screen { text-align: center; padding-top: 35px; }
#ending-screen h1 { font-size: 1.9em; margin-bottom: 10px; }
.etext { color: #8b949e; line-height: 1.85; max-width: 600px; margin: 12px auto; font-size: 0.88em; }
.gb { background: linear-gradient(135deg, #1a2a1a, #0d1117); border: 2px solid #3fb950; border-radius: 10px; padding: 18px; margin: 16px 0; }
.gb h2 { color: #3fb950; font-size: 1.3em; }
.glist { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 12px; }
.gi { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 10px 14px; text-align: center; min-width: 90px; }
.gi .gn { font-weight: bold; font-size: 0.88em; }
.gi .gr { font-size: 0.73em; color: #3fb950; margin-top: 3px; }
.gi .go { font-size: 0.66em; color: #8b949e; margin-top: 2px; }
.egood h1 { color: #3fb950; } .eok h1 { color: #d29922; } .ebad h1 { color: #f85149; }
::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #0d1117; } ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

<div id="title-screen" class="screen active">
  <h1>🎓 毕业模拟器</h1>
  <p class="sub">—— 距离毕业还有30天 ——</p>
  <p class="warn">⚠️ 本故事纯属虚构。</p>
  <button class="btn bp" onclick="window.startGame()">开始</button>
</div>

<div id="game-screen" class="screen">
  <div class="gh">
    <div><span class="gday">📅 第 <span id="dn">1</span> 天</span><br><span class="gwk" id="tl">周一</span></div>
    <div class="gtag" id="st"></div>
    <div style="text-align:right;font-size:0.8em;color:#8b949e;">研三 · 最后一个学期</div>
  </div>
  <div class="grid">
    <div class="panel"><h3>📊 状态</h3><div id="sc"></div></div>
    <div class="panel"><h3>👥 今日</h3><div id="cc"></div></div>
    <div class="panel" id="elog"><h3>📜 日志</h3><div id="ec2"></div></div>
    <div id="carea"></div>
  </div>
</div>

<div id="ending-screen" class="screen"><div id="endc"></div></div>

</div>

<script>
(function() {
'use strict';

var G = { day: 0, scene: 0, player: { paper: 35, health: 65, mental: 60 }, flags: {}, done: false, _ch: [] };

function rs() {
  var p = G.player, h = '';
  [{ l: '论文进度', k: 'paper', c: 'sp' },{ l: '身体状况', k: 'health', c: 'sb' },{ l: '精神状态', k: 'mental', c: 'sm' }].forEach(function(s) {
    h += '<div class="srow"><span class="slabel">' + s.l + '</span><div class="sbar"><div class="sfill ' + s.c + '" style="width:' + p[s.k] + '%"></div></div><span class="sv">' + p[s.k] + '</span></div>';
  });
  document.getElementById('sc').innerHTML = h;
}

function rc() {
  var d = getS();
  var list = [
    { n: 'D师姐', a: '👩‍🔬', t: '博三', s: d.dr || '' },{ n: 'E师姐', a: '👩‍💻', t: '博三', s: d.er || '' },
    { n: 'F师兄', a: '🧑‍🔬', t: '博二', s: d.fr || '' },{ n: 'G师兄', a: '🧑‍💻', t: '博二', s: d.gr || '' },
    { n: 'X/Y/Z', a: '🙂', t: '研三·同级', s: d.xy || '' },{ n: '刘装装', a: '🤖', t: '研三·同级', s: d.lz || '' },
    { n: '刘不来', a: '🛌', t: '研三·同级', s: d.lb || '' }
  ];
  var h = '';
  list.forEach(function(c) {
    h += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:0.8em;"><span>' + c.a + '</span><span style="font-weight:bold;">' + c.n + '</span><span style="color:#8b949e;font-size:0.72em;">' + c.t + '</span></div><div style="font-size:0.72em;color:#58a6ff;margin-bottom:6px;margin-left:22px;">' + c.s + '</div>';
  });
  document.getElementById('cc').innerHTML = h;
}

function ae(t, c) { c = c || 'en'; var el = document.getElementById('ec2'); var dv = document.createElement('div'); dv.className = 'ee ' + c; dv.textContent = t; el.appendChild(dv); el.scrollTop = el.scrollHeight; }
function am(t) { ae(t, 'et'); }
function sc(a) { G._ch = a; var h = ''; a.forEach(function(c, i) { h += '<button class="btn ' + (c.cls || 'bs') + ' bsm" onclick="window._pk(' + i + ')">' + c.label + '</button>'; }); document.getElementById('carea').innerHTML = h; }
function cc() { document.getElementById('carea').innerHTML = ''; }
function uh() { var d = getS(); document.getElementById('dn').textContent = d.day; document.getElementById('tl').textContent = d.wk; document.getElementById('st').textContent = d.tag; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function mp(k, d) { G.player[k] = clamp(G.player[k] + d, 0, 100); }

function getS() {
  var S = {

    0: { day: 1, wk: '周一 · 距毕业30天', tag: '📌 普通的一天', dr: '在细胞房忙', er: '在看文献', fr: '在配试剂', gr: '在写代码', xy: '在工位上各忙各的', lz: '9:40才来，一股酸馊味', lb: '工位空着',
      run: function() {
        am('8:30');
        ae('你跟D师姐前后脚到实验室。刷卡、开灯、开超净台——这就是研三的日常。', 'en');
        ae('X、Y、Z也陆续到了。大家心照不宣：毕业倒计时三十天，论文还没写完。', 'en');
        am('9:40');
        ae('一股酸馊味飘过来——刘装装到了。他在工位上坐下，屏幕上弹出好几个AI对话框。', 'eo');
        ae('他的实验台上干净得像没人用过。', 'ed');
        am('10:00');
        ae('刘不来的工位还是空的。你已经习惯了。', 'en');
        sc([{ label: '🍳 EMSA（跑一天）', cls: 'bp', act: 'e1' },{ label: '🧬 qPCR六板（跑一天）', cls: 'bp', act: 'e2' },{ label: '🌿 烟草注射（一天）', cls: 'bp', act: 'e3' },{ label: '🔬 显微镜（拍一天）', cls: 'bp', act: 'e4' },{ label: '🌾 下地采样（一天）', cls: 'bp', act: 'e5' },{ label: '🧪 WB（跑一天）', cls: 'bp', act: 'e6' }]);
      },
      handle: function(a) {
        var t = { e1: 'EMSA跑完，shift band出来了。论文又充实了一页。', e2: '六板qPCR跑完，移液移得手酸。但Ct值很漂亮。', e3: '烟草注射完毕。三天后看荧光。', e4: '显微镜拍了一天，找到了好几个好视野。', e5: '下地采样，晒脱一层皮。样本质量不错。', e6: 'WB从制胶到曝光跑完。条带清晰，值得。' };
        mp('paper', 6); mp('health', -3); mp('mental', -2);
        ae(t[a] || '实验进展顺利。', 'eg');
        goS(1);
      }
    },

    1: { day: 3, wk: '周三', tag: '📌 老板的指派', dr: '在整理组会PPT', er: '被老板叫去谈话', fr: '在做实验', gr: '在跑数据', xy: '各忙各的', lz: '在问AI', lb: '——',
      run: function() {
        am('9:00');
        ae('E师姐被老板叫进办公室。出来时表情微妙。', 'ed');
        ae('D师姐小声说："老板让E师姐带刘不来做实验。这已经是第三个被指定的人了。"', 'es');
        ae('E师姐给刘不来发了微信。过了一个多小时："好的师姐，我这两天就过来。"', 'en');
        ae('E师姐把手机屏幕亮给你看——聊天记录往上翻，几乎全是"好的师姐"和"这两天就过来"。', 'ed');
        G.lbchain = (G.lbchain || 0) + 1;
        sc([{ label: '🧪 继续补实验数据', cls: 'bp', act: 'exp' },{ label: '📝 写论文Introduction和Discussion', cls: 'bp', act: 'write' },{ label: '📊 整理图表，排版参考文献', cls: 'bs', act: 'fig' },{ label: '😴 今天效率不高，早点回去休息', cls: 'bs', act: 'rest' }]);
      },
      handle: function(a) {
        if (a === 'exp') { mp('paper', 5); mp('health', -3); ae('补了一批实验数据。论文的实验部分越来越完整了。', 'eg'); }
        else if (a === 'write') { mp('paper', 8); mp('mental', -4); ae('写到深夜，Introduction终于理顺了逻辑。咖啡喝了三杯。', 'eg'); }
        else if (a === 'fig') { mp('paper', 5); ae('图表排版是个细致活。做完之后论文看起来像样多了。', 'eg'); }
        else { mp('health', 8); mp('mental', 6); ae('难得早睡。身体是毕业的本钱。', 'eg'); }
        goS(2);
      }
    },

    2: { day: 5, wk: '周五', tag: '📌 组会前夕', dr: '在准备明天的汇报', er: '在核对数据', fr: '在整理结果', gr: '在跑最后的分析', xy: '都在赶PPT', lz: '今天居然没走——明天组会，他要通宵', lb: '——',
      run: function() {
        am('17:00');
        ae('明天是周六组会。大家都陆陆续续走了，但刘装装还在工位上。', 'en');
        ae('你看到他拿出一罐红牛和一包速溶咖啡。这是他的"组会准备"——通宵。', 'ed');
        ae('D师姐路过时叹了口气。谁都知道他通宵是为了明天表演给老板看。', 'es');
        sc([{ label: '🌙 也留下来加班赶论文', cls: 'bd', act: 'night' },{ label: '🏠 回家休息，明天组会精神好点', cls: 'bp', act: 'home' },{ label: '💬 跟X和Y去食堂吃个饭再回来', cls: 'bs', act: 'dinner' },{ label: '📝 把组会PPT再打磨一下', cls: 'bs', act: 'ppt' }]);
      },
      handle: function(a) {
        if (a === 'night') { mp('paper', 6); mp('health', -6); mp('mental', -5); ae('你熬到凌晨两点。论文又推进了一截，但眼睛干涩得厉害。旁边的刘装装还在对着AI对话框敲键盘。', 'eg'); }
        else if (a === 'home') { mp('health', 5); mp('mental', 4); ae('你早早回去睡了。明天组会，状态最重要。', 'eg'); }
        else if (a === 'dinner') { mp('mental', 4); mp('health', 2); ae('食堂里X吐槽说他的论文Discussion还差两千字。Y说他的图还没做完。大家相视苦笑。', 'en'); }
        else { mp('paper', 3); ae('你把PPT从头到尾理了一遍。','eg'); }
        goS(3);
      }
    },

    3: { day: 6, wk: '周六 · 组会日', tag: '📌 卫生问题', dr: 'PPT一如既往地扎实', er: '数据展示清晰', fr: '汇报行为学结果', gr: '生信分析汇报', xy: '轮流汇报', lz: '没来组会', lb: '—— 没来',
      run: function() {
        am('9:00 — 组会');
        ae('📢 组会。D师姐汇报了最新的WB和Co-IP，数据扎实。E师姐、F师兄、G师兄和X、Y、Z各有进展。', 'es');
        am('自由讨论');
        ae('H老师清了清嗓子："我说一个事。实验室卫生——包括个别同学的个人卫生——大家注意一下。我们实验室通风条件有限，请互相尊重。"', 'ed');
        ae('她说这话的时候，刘装装的位子空着——他没来组会。', 'ed');
        ae('会议室里安静了两秒。每个人都心知肚明H老师在说什么，但本人不在场，这场景显得格外荒唐。', 'ed');
        ae('会后H老师把《实验室卫生管理条例》发到了课题组的微信大群里。', 'ed');
        ae('刘不来的位子一如既往地空着。老板依然没有问。', 'eb');
        G.flags.hyg = true;
        sc([{ label: '🌬️ 默默起身开窗通风', cls: 'bs', act: 'win' },{ label: '😤 在群里回"收到"并@刘装装', cls: 'bw', act: 'at' },{ label: '🤐 不动声色，看刘装装什么时候回复', cls: 'bs', act: 'wait' },{ label: '😶 继续写自己的论文——毕业要紧', cls: 'bp', act: 'focus' }]);
      },
      handle: function(a) {
        if (a === 'win') { mp('health', 2); ae('你把实验室的窗户全部打开。十一月的冷风灌进来，但至少能呼吸。', 'en'); }
        else if (a === 'at') { mp('mental', -2); ae('你@了刘装装。过了一个小时他回复："收到了。"然后什么也没变。', 'ed'); }
        else if (a === 'wait') { ae('你等了一整天。刘装装在群里始终没有回复。', 'en'); }
        else { mp('paper', 3); ae('你戴上耳机继续改论文。', 'eg'); }
        goS(4);
      }
    },

    4: { day: 9, wk: '周二', tag: '📌 忍无可忍', dr: '突然起身离开了工位', er: '默默戴上了口罩', fr: '去动物房了', gr: '戴着降噪耳机', xy: '有人在用风扇对着自己吹', lz: '在工位上，酸馊味浓烈', lb: '——',
      run: function() {
        am('11:30');
        ae('距离H老师发管理条例已经过去好几天。什么也没有改变。', 'ed');
        ae('刘装装工位附近的酸馊味一如既往。你发现自己看文献时下意识用衣领捂着鼻子。', 'eo');
        ae('D师姐先站起来了。她拿起笔记本，一言不发地走出了实验室。经过你身边时低声说了三个字："休息室。"', 'es');
        mp('health', -4); mp('mental', -3);
        sc([{ label: '😮‍💨 跟D师姐去休息室避难', cls: 'bp', act: 'follow' },{ label: '😤 强忍留下，开窗+风扇开到最大', cls: 'bd', act: 'stay' },{ label: '🏃 去动物房帮F师兄', cls: 'bs', act: 'animal' },{ label: '☕ 去楼下咖啡厅写论文', cls: 'bs', act: 'cafe' }]);
      },
      handle: function(a) {
        if (a === 'follow') { mp('mental', 5); mp('paper', 2); ae('D师姐在休息室里边写论文边说："课题组待久了，你会发现什么样的人都有。但你得毕业——别让别人的问题影响你。"', 'es'); }
        else if (a === 'stay') { mp('health', -3); ae('你留下来了。E师姐默默递来一瓶风油精。你擦在人中上，勉强撑过了一下午。', 'en'); }
        else if (a === 'animal') { mp('health', 3); ae('动物房里至少是动物的正常味道。F师兄感慨："还是老鼠单纯。"', 'en'); }
        else { mp('mental', 5); mp('paper', 5); ae('咖啡厅里空气清新，你效率极高地改完了一章。', 'eg'); }
        G.flags.driven = true;
        goS(5);
      }
    },

    5: { day: 11, wk: '周四', tag: '📌 赶论文', dr: '在改自己论文的图', er: '在写讨论部分', fr: '在整理动物实验记录', gr: '在调代码参数', xy: '都在埋头赶论文', lz: '在AI对话框和PPT之间来回切', lb: '——',
      run: function() {
        am('10:00');
        ae('论文的每一个章节都在推进，但每天熬夜让身体开始报警——黑眼圈、肩颈酸痛、偶尔心悸。', 'en');
